<!DOCTYPE html>
<html>
<head>
    <title>Simple jQuery Calculator</title>

    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input, select {
            height: 30px;
            padding: 5px;
        }

        button {
            margin-top: 10px;
            padding: 5px 15px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="number" id="firstNumber" placeholder="First Number">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <input type="number" id="secondNumber" placeholder="Second Number">
    </div>

    <button id="solveBtn">Solve</button>

    <p id="result"></p>

    <script>
        $(function() {

            $("#solveBtn").click(function() {

                let num1 = parseFloat($("#firstNumber").val());
                let num2 = parseFloat($("#secondNumber").val());
                let op = $("#operator").val();
                let result;

                if (isNaN(num1) || isNaN(num2)) {
                    $("#result").text("Please enter valid numbers.");
                    return;
                }

                switch(op) {
                    case "+": result = num1 + num2; break;
                    case "-": result = num1 - num2; break;
                    case "*": result = num1 * num2; break;
                    case "/":
                        if (num2 === 0) {
                            $("#result").text("Cannot divide by zero.");
                            return;
                        }
                        result = num1 / num2;
                        break;
                }

                $("#result").text("Result: " + result);

            });

        });
    </script>

</body>
</html>
