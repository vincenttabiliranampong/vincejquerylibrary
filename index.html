<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container input,
        .container select {
            height: 25px;
        }

        .solve-btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <label>First Number:</label>
        <input type="text" id="firstNumber">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <label>Second Number:</label>
        <input type="text" id="secondNumber">
    </div>

    <div class="solve-btn">
        <button id="solveBtn">Solve</button>
    </div>

    <p id="result"></p>

    <script>
        $(document).ready(function() {

            $("#solveBtn").click(function() {

                var num1 = parseFloat($("#firstNumber").val());
                var num2 = parseFloat($("#secondNumber").val());
                var op = $("#operator").val();
                var result;

                switch(op) {
                    case "+": result = num1 + num2; break;
                    case "-": result = num1 - num2; break;
                    case "*": result = num1 * num2; break;
                    case "/": result = num1 / num2; break;
                }

                $("#result").html("Result: " + result);

            });

        });
    </script>

</body>
